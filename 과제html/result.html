<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKALA 회원가입 완료</title>
    <link rel="stylesheet" href="../과제css/signUpResult.css">
</head>

<body class="result-page">
    <!-- 결과 페이지 상단 고정 헤더 -->
    <header class="result-header">
        <div class="header-inner">
            <h1>
                <a href="index.html" class="brand-link" aria-label="SKALA 메인 페이지로 이동">
                    SKALA
                </a>
            </h1>
            <nav aria-label="주요 메뉴">
                <a href="signUp.html" class="header-button">회원가입</a>
            </nav>
        </div>
    </header>

    <main class="result-main">
        <section class="result-card">
            <!-- 회원가입 완료 안내 -->
            <div class="complete-icon" aria-hidden="true">✓</div>
            <p class="eyebrow">WELCOME TO SKALA</p>
            <h2>회원가입이 완료되었습니다</h2>

            <p class="welcome-message">
                <strong id="welcomeName">회원</strong>님,<br>
                SKALA 회원가입을 환영합니다! 🎉
            </p>

            <div class="join-summary">
                <div class="summary-item">
                    <span>회원번호</span>
                    <strong id="memberNumber">-</strong>
                </div>
                <div class="summary-item">
                    <span>가입일시</span>
                    <strong id="joinDate">-</strong>
                </div>
            </div>

            <!-- 회원가입 페이지에서 입력한 값 표시 -->
            <section class="member-info">
                <h3>가입 정보</h3>

                <table>
                    <caption class="blind">회원가입 시 입력한 정보</caption>
                    <tbody>
                        <tr><th scope="row">아이디</th><td id="resultId">-</td></tr>
                        <tr><th scope="row">이름</th><td id="resultName">-</td></tr>
                        <tr><th scope="row">이메일</th><td id="resultEmail">-</td></tr>
                        <tr><th scope="row">생년월일</th><td id="resultBirth">-</td></tr>
                        <tr><th scope="row">전화번호</th><td id="resultTel">-</td></tr>
                        <tr><th scope="row">성별</th><td id="resultGender">-</td></tr>
                        <tr><th scope="row">지역</th><td id="resultRegion">-</td></tr>
                        <tr><th scope="row">관심 분야</th><td id="resultInterests">선택하지 않았습니다.</td></tr>
                        <tr><th scope="row">가입 경로</th><td id="resultJoinPath">-</td></tr>
                        <tr><th scope="row">자기소개</th><td id="resultIntroduction" class="introduction-text">작성하지 않았습니다.</td></tr>
                        <tr><th scope="row">이용약관</th><td id="resultTerms">-</td></tr>
                    </tbody>
                </table>
            </section>

            <div class="result-buttons">
                <a href="signUp.html" class="btn">다시 가입하기</a>
                <a href="index.html" class="btn btn-primary">메인으로</a>
            </div>

            <!--바로가기 새 탭 열기(target=blank)기능 추가-->
            <section class="shortcut-links">
                <h3>바로가기</h3>

                <ul>
                    <li><a href="index.html" target="_blank">메인 페이지 (새 탭)</a></li>
                    <li><a href="myTrip.html">여행 소개</a></li>
                    <li><a href="gallery.html">스칼라 여정 소개</a></li>
                </ul>
            </section>
            </section>
        

    </main>

    <footer>
        <p>© 2026 SKALA 가입 페이지</p>
    </footer>

    <script src="../과제js/signUpResult.js"></script>
</body>
</html>
