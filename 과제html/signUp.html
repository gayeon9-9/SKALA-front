<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>회원가입</title>

    <link rel="stylesheet" href="../과제css/style.css">
</head>

<body>
    <!-- 상단 고정 헤더 -->
    <header class="signup-header">
        <h1>👤 회원가입</h1>
        <p><b>SKALA 회원가입 페이지입니다.</b></p>

        <!-- 필수 정보 입력 진행률 -->
        <div class="signup-progress">
            <div class="progress-info">
                <span>필수 정보 입력</span>
                <strong id="progressText">0 / 6</strong>
            </div>

            <div class="progress-track">
                <div id="progressBar" class="progress-bar"></div>
            </div>
        </div>
    </header>

    <form
        id="signupForm"
        action="signUpResult.html"
        method="get"
    >
        <!-- 계정 정보 -->
        <fieldset>
            <legend>계정 정보</legend>

            <!-- 아이디 -->
            <p class="form-row">
                <label for="userId">아이디 :</label>

                <span class="input-with-button">
                    <input
                        type="text"
                        id="userId"
                        name="userId"
                        minlength="4"
                        maxlength="12"
                        pattern="[A-Za-z0-9]{4,12}"
                        title="영문과 숫자만 사용하여 4~12자로 입력해 주세요."
                        placeholder="4~12자 영문/숫자"
                        required
                    >

                    <button
                        type="button"
                        class="clear-input-button"
                        data-target="userId"
                        aria-label="아이디 지우기"
                    >
                        ×
                    </button>
                </span>

                <button
                    type="button"
                    id="checkIdButton"
                >
                    중복 확인
                </button>

                <small class="required-mark">(필수)</small>
            </p>

            <p
                id="idCheckMessage"
                class="validation-message"
            ></p>

            <!-- 비밀번호 -->
            <p class="form-row">
                <label for="userPw">비밀번호 :</label>

                <input
                    type="password"
                    id="userPw"
                    minlength="8"
                    title="비밀번호는 8자 이상 입력해 주세요."
                    placeholder="8자 이상 입력"
                    required
                >

                <button
                    type="button"
                    id="togglePasswordButton"
                    class="sub-button"
                >
                    보기
                </button>

                <small class="required-mark">(필수)</small>
            </p>

            <!-- 비밀번호 안전도 -->
            <div class="password-strength-area">
                <div class="password-strength-track">
                    <div
                        id="passwordStrengthBar"
                        class="password-strength-bar"
                    ></div>
                </div>

                <span id="passwordStrengthText">
                    비밀번호 안전도: 입력 전
                </span>
            </div>

            <!-- 비밀번호 확인 -->
            <p class="form-row">
                <label for="userPwCheck">비밀번호 확인 :</label>

                <input
                    type="password"
                    id="userPwCheck"
                    minlength="8"
                    title="비밀번호를 한 번 더 입력해 주세요."
                    placeholder="비밀번호를 한 번 더 입력해 주세요"
                    required
                >

                <small class="required-mark">(필수)</small>
            </p>

            <p
                id="passwordCheckMessage"
                class="validation-message"
            ></p>

            <!-- 이메일 -->
            <p class="form-row email-row">
                <label for="userEmail">이메일 :</label>

                <span class="input-with-button email-id-area">
                    <input
                        type="text"
                        id="userEmail"
                        name="userEmail"
                        placeholder="example"
                        required
                    >

                    <button
                        type="button"
                        class="clear-input-button"
                        data-target="userEmail"
                        aria-label="이메일 지우기"
                    >
                        ×
                    </button>
                </span>

                <span class="email-symbol">@</span>

                <span class="replace-input-area">
                    <select
                        id="emailDomain"
                        name="emailDomain"
                        required
                    >
                        <option value="">도메인 선택</option>
                        <option value="direct">직접 입력</option>
                        <option value="sk.com">sk.com</option>
                        <option value="naver.com">naver.com</option>
                        <option value="gmail.com">gmail.com</option>
                        <option value="daum.net">daum.net</option>
                        <option value="kakao.com">kakao.com</option>
                    </select>

                    <input
                        type="text"
                        id="directEmailDomain"
                        name="directEmailDomain"
                        placeholder="도메인 직접 입력"
                        hidden
                    >
                </span>

                <small class="required-mark">(필수)</small>
            </p>
        </fieldset>

        <!-- 개인 프로필 정보 -->
        <fieldset>
            <legend>개인 프로필 정보</legend>

            <!-- 이름 -->
            <p class="form-row">
                <label for="userName">이름 :</label>

                <input
                    type="text"
                    id="userName"
                    name="userName"
                    required
                >

                <small class="required-mark">(필수)</small>
            </p>

            <!-- 생년월일 -->
            <p class="form-row">
                <label for="userBirth">생년월일 :</label>

                <input
                    type="date"
                    id="userBirth"
                    name="userBirth"
                >

                <small class="optional-mark">(선택)</small>
            </p>

            <!-- 전화번호 -->
            <p class="form-row">
                <label for="userTel">전화번호 :</label>

                <span class="input-with-button">
                    <input
                        type="tel"
                        id="userTel"
                        name="userTel"
                        placeholder="010-0000-0000"
                        pattern="010-[0-9]{4}-[0-9]{4}"
                        title="010-0000-0000 형식으로 입력해 주세요."
                        maxlength="13"
                        inputmode="numeric"
                    >

                    <button
                        type="button"
                        class="clear-input-button"
                        data-target="userTel"
                        aria-label="전화번호 지우기"
                    >
                        ×
                    </button>
                </span>

                <small class="optional-mark">(선택)</small>
            </p>

            <!-- 성별 -->
            <p class="choice-row">
                <span class="choice-title">성별 :</span>

                <label>
                    <input
                        type="radio"
                        name="gender"
                        value="male"
                        checked
                    >
                    남성
                </label>

                <label>
                    <input
                        type="radio"
                        name="gender"
                        value="female"
                    >
                    여성
                </label>

                <label>
                    <input
                        type="radio"
                        name="gender"
                        value="none"
                    >
                    선택 안 함
                </label>

                <small class="optional-mark">(선택)</small>
            </p>

            <!-- 지역 -->
            <p class="form-row">
                <label for="region">지역 :</label>

                <select
                    id="region"
                    name="region"
                >
                    <option value="">== 시/도 선택 ==</option>
                    <option value="seoul">서울특별시</option>
                    <option value="busan">부산광역시</option>
                    <option value="daegu">대구광역시</option>
                    <option value="incheon">인천광역시</option>
                    <option value="gwangju">광주광역시</option>
                    <option value="daejeon">대전광역시</option>
                    <option value="ulsan">울산광역시</option>
                    <option value="sejong">세종특별자치시</option>
                    <option value="gyeonggi">경기도</option>
                    <option value="gangwon">강원특별자치도</option>
                    <option value="chungbuk">충청북도</option>
                    <option value="chungnam">충청남도</option>
                    <option value="jeonbuk">전북특별자치도</option>
                    <option value="jeonnam">전라남도</option>
                    <option value="gyeongbuk">경상북도</option>
                    <option value="gyeongnam">경상남도</option>
                    <option value="jeju">제주특별자치도</option>
                </select>

                <small class="optional-mark">(선택)</small>
            </p>

            <!-- JS로 생성되는 주소 입력 영역 -->
            <div id="districtArea"></div>
            <div id="townArea"></div>

            <!-- 관심 분야 -->
            <div class="interest-group">
                <p class="interest-title">
                    관심 분야 (중복 선택 가능)
                    <small class="optional-mark">(선택)</small>
                </p>

                <label>
                    <input
                        type="checkbox"
                        name="interest"
                        value="frontend"
                    >
                    웹 프론트엔드 (Vue.js/HTML)
                </label>

                <label>
                    <input
                        type="checkbox"
                        name="interest"
                        value="uiux"
                    >
                    UI/UX 디자인 표준
                </label>

                <label>
                    <input
                        type="checkbox"
                        name="interest"
                        value="backend"
                    >
                    백엔드 & 데이터베이스
                </label>

                <label>
                    <input
                        type="checkbox"
                        name="interest"
                        value="devops"
                    >
                    클라우드 & 인프라
                </label>

                <label>
                    <input
                        type="checkbox"
                        id="otherInterestCheck"
                        name="interest"
                        value="other"
                    >
                    그 외
                </label>

                <input
                    type="text"
                    id="otherInterest"
                    name="otherInterest"
                    placeholder="관심 분야를 직접 입력해 주세요."
                    hidden
                >
            </div>

            <!-- 가입경로 -->
            <p class="form-row">
                <label for="joinPath">가입경로 :</label>

                <span class="replace-input-area">
                    <select
                        id="joinPath"
                        name="joinPath"
                    >
                        <option value="">== 선택해 주세요 ==</option>
                        <option value="direct">직접 입력</option>
                        <option value="search">검색</option>
                        <option value="ads">광고</option>
                        <option value="sns">SNS</option>
                        <option value="recommend">지인 추천</option>
                    </select>

                    <input
                        type="text"
                        id="directJoinPath"
                        name="directJoinPath"
                        placeholder="가입경로 직접 입력"
                        hidden
                    >
                </span>

                <small class="optional-mark">(선택)</small>
            </p>
        </fieldset>

        <!-- 자기소개 -->
        <fieldset>
            <legend>자기소개</legend>

            <div class="intro-row">
                <label for="intro">
                    나를 표현하는 한 줄 소개 또는 가입 인사 :
                </label>

                <div class="intro-input-area">
                    <textarea
                        id="intro"
                        name="intro"
                        rows="5"
                        maxlength="200"
                        placeholder="여기에 내용을 입력하세요. (최대 200자)"
                    ></textarea>

                    <p class="intro-count">
                        <span id="introCount">0</span> / 200자
                    </p>
                </div>
            </div>
        </fieldset>

        <!-- 약관 동의 -->
        <fieldset>
            <legend>약관 동의</legend>

            <p>
                <label>
                    <input
                        type="checkbox"
                        id="agree"
                        name="agree"
                        value="yes"
                        required
                    >

                    이용약관 및 개인정보 수집에 동의합니다.
                </label>

                <small class="required-mark">(필수)</small>

                <a
                    href="terms.html"
                    target="_blank"
                >
                    [약관 보기]
                </a>
            </p>
        </fieldset>

        <!-- 제출 버튼 -->
        <p class="form-buttons">
            <input
                type="submit"
                value="동의하고 회원가입"
            >

            <input
                type="reset"
                value="다시 작성"
            >
        </p>
    </form>

    <script src="../과제js/script.js"></script>
</body>
</html>
