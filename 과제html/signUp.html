<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKALA 회원가입</title>
    <link rel="stylesheet" href="../과제css/signUp.css">
</head>

<body class="signup-page">
    <!-- 스크롤해도 위에 고정되는 헤더 -->
    <header class="signup-header">
        <div class="header-inner">
            <div>
                <h1>SKALA 회원가입</h1>
                <p>필수 정보를 입력하고 새로운 여정을 시작하세요.</p>
            </div>

            <div class="signup-progress" aria-label="필수 정보 입력 진행률">
                <div class="progress-info">
                    <span>필수 정보 입력</span>
                    <strong id="progressText">0 / 6</strong>
                </div>
                <div class="progress-track">
                    <div id="progressBar" class="progress-bar"></div>
                </div>
            </div>
        </div>
    </header>

    <main>
        <!-- 입력한 값은 result.html로 보냄 -->
        <form id="signupForm" action="result.html" method="get">
            <p class="required-guide"><span>*</span> 표시는 필수 입력 항목입니다.</p>

            <!-- 아이디, 비밀번호, 이메일 -->
            <fieldset class="form-card">
                <legend>계정 정보</legend>

                <div class="form-row">
                    <label for="userId">아이디 <span class="required-mark">*</span></label>
                    <div class="field-area">
                        <div class="field-with-button">
                            <input
                                type="text"
                                id="userId"
                                name="userId"
                                minlength="4"
                                maxlength="12"
                                pattern="[A-Za-z0-9]{4,12}"
                                title="영문과 숫자만 사용하여 4~12자로 입력해 주세요."
                                placeholder="영문·숫자 4~12자"
                                required
                            >
                            <button type="button" id="checkIdButton" class="btn btn-sub">중복 확인</button>
                        </div>
                        <small id="idCheckMessage" class="validation-message">영문과 숫자만 사용할 수 있습니다.</small>
                    </div>
                </div>

                <div class="form-row">
                    <label for="userPw">비밀번호 <span class="required-mark">*</span></label>
                    <div class="field-area">
                        <div class="field-with-button">
                            <input
                                type="password"
                                id="userPw"
                                minlength="8"
                                maxlength="30"
                                placeholder="8자 이상 입력"
                                required
                            >
                            <button type="button" id="togglePasswordButton" class="btn btn-sub">보기</button>
                        </div>
                        <div class="password-strength-area">
                            <div class="password-strength-track">
                                <div id="passwordStrengthBar" class="password-strength-bar"></div>
                            </div>
                            <small id="passwordStrengthText">안전도: 입력 전</small>
                        </div>
                        <small id="passwordLengthMessage" class="validation-message"></small>
                    </div>
                </div>

                <div class="form-row">
                    <label for="userPwCheck">비밀번호 확인 <span class="required-mark">*</span></label>
                    <div class="field-area">
                        <input
                            type="password"
                            id="userPwCheck"
                            minlength="8"
                            maxlength="30"
                            placeholder="비밀번호를 한 번 더 입력"
                            required
                        >
                        <small id="passwordCheckMessage" class="validation-message"></small>
                    </div>
                </div>

                <div class="form-row">
                    <label for="emailId">이메일 <span class="required-mark">*</span></label>
                    <div class="field-area">
                        <!-- 이메일 아이디와 도메인을 따로 입력 -->
                        <div class="email-parts">
                            <input
                                type="text"
                                id="emailId"
                                name="emailId"
                                pattern="[A-Za-z0-9._%+-]+"
                                title="이메일 아이디를 영문, 숫자, 특수문자로 입력해 주세요."
                                placeholder="이메일 아이디"
                                required
                            >
                            <span class="email-symbol">@</span>
                            <div class="email-domain-area">
                                <select id="emailDomain" name="emailDomain" required>
                                    <option value="">도메인 선택</option>
                                    <option value="sk.com">sk.com</option>
                                    <option value="naver.com">naver.com</option>
                                    <option value="gmail.com">gmail.com</option>
                                    <option value="daum.net">daum.net</option>
                                    <option value="kakao.com">kakao.com</option>
                                    <option value="direct">직접 입력</option>
                                </select>
                                <input
                                    type="text"
                                    id="directEmailDomain"
                                    name="directEmailDomain"
                                    pattern="[A-Za-z0-9.-]+\.[A-Za-z]{2,}"
                                    title="example.com 형식으로 입력해 주세요."
                                    placeholder="도메인 직접 입력"
                                    hidden
                                >
                            </div>
                        </div>

                        <!-- 두 값을 합친 이메일이 실제로 전송됨 -->
                        <input
                            type="email"
                            id="userEmail"
                            name="userEmail"
                            class="combined-email"
                            tabindex="-1"
                            aria-hidden="true"
                            required
                        >
                        <small id="emailPreview" class="validation-message">완성 이메일: -</small>
                    </div>
                </div>
            </fieldset>

            <!-- 이름, 연락처, 지역 등 기본 정보 -->
            <fieldset class="form-card">
                <legend>개인 프로필 정보</legend>

                <div class="form-row">
                    <label for="userName">이름 <span class="required-mark">*</span></label>
                    <div class="field-area">
                        <input type="text" id="userName" name="userName" placeholder="이름 입력" required>
                    </div>
                </div>

                <div class="form-row">
                    <label for="userBirth">생년월일</label>
                    <div class="field-area">
                        <input
                            type="date"
                            id="userBirth"
                            name="userBirth"
                            min="1900-01-01"
                            max="2026-07-17"
                        >
                    </div>
                </div>

                <div class="form-row">
                    <label for="userTel">전화번호</label>
                    <div class="field-area">
                        <input
                            type="tel"
                            id="userTel"
                            name="userTel"
                            placeholder="010-0000-0000"
                            pattern="010-[0-9]{4}-[0-9]{4}"
                            title="010-0000-0000 형식으로 입력해 주세요."
                            maxlength="13"
                            inputmode="numeric"
                        >
                    </div>
                </div>

                <fieldset class="choice-fieldset">
                    <legend>성별</legend>
                    <div class="choice-options">
                        <label><input type="radio" name="gender" value="남성"> 남성</label>
                        <label><input type="radio" name="gender" value="여성"> 여성</label>
                        <label><input type="radio" name="gender" value="선택 안 함" checked> 선택 안 함</label>
                    </div>
                </fieldset>

                <div class="form-row">
                    <label for="region">지역</label>
                    <div class="field-area">
                        <select id="region" name="region">
                            <option value="">시·도 선택</option>
                            <option value="서울특별시">서울특별시</option>
                            <option value="부산광역시">부산광역시</option>
                            <option value="대구광역시">대구광역시</option>
                            <option value="인천광역시">인천광역시</option>
                            <option value="광주광역시">광주광역시</option>
                            <option value="대전광역시">대전광역시</option>
                            <option value="울산광역시">울산광역시</option>
                            <option value="세종특별자치시">세종특별자치시</option>
                            <option value="경기도">경기도</option>
                            <option value="강원특별자치도">강원특별자치도</option>
                            <option value="충청북도">충청북도</option>
                            <option value="충청남도">충청남도</option>
                            <option value="전북특별자치도">전북특별자치도</option>
                            <option value="전라남도">전라남도</option>
                            <option value="경상북도">경상북도</option>
                            <option value="경상남도">경상남도</option>
                            <option value="제주특별자치도">제주특별자치도</option>
                        </select>
                    </div>
                </div>

                <!-- 시·도를 고르면 JS에서 시·군·구를 만들어 줌 -->
                <div id="districtArea"></div>
                <div id="townArea"></div>

                <!-- 같은 name을 사용해서 여러 값이 같이 넘어감 -->
                <fieldset class="choice-fieldset">
                    <legend>관심 분야 <small>(중복 선택 가능)</small></legend>
                    <div class="choice-options interest-options">
                        <label class="interest-card">
                            <input type="checkbox" name="interest" value="프론트엔드">
                            <span><strong>프론트엔드</strong><small>HTML · CSS · JavaScript</small></span>
                        </label>
                        <label class="interest-card">
                            <input type="checkbox" name="interest" value="디자인">
                            <span><strong>디자인</strong><small>UI · UX · 웹 디자인</small></span>
                        </label>
                        <label class="interest-card">
                            <input type="checkbox" name="interest" value="백엔드">
                            <span><strong>백엔드</strong><small>서버 · API 개발</small></span>
                        </label>
                        <label class="interest-card">
                            <input type="checkbox" name="interest" value="데이터베이스">
                            <span><strong>데이터베이스</strong><small>데이터 저장 · 관리</small></span>
                        </label>
                        <label class="interest-card">
                            <input type="checkbox" name="interest" value="클라우드·인프라">
                            <span><strong>클라우드·인프라</strong><small>배포 · 서버 운영</small></span>
                        </label>
                        <label class="interest-card">
                            <input type="checkbox" id="otherInterestCheck">
                            <span><strong>그 외</strong><small>직접 입력</small></span>
                        </label>
                    </div>
                    <input
                        type="text"
                        id="otherInterest"
                        name="otherInterest"
                        placeholder="관심 분야를 직접 입력해 주세요."
                        hidden
                    >
                </fieldset>

                <div class="form-row">
                    <label for="joinPath">가입 경로</label>
                    <div class="field-area">
                        <select id="joinPath" name="joinPath">
                            <option value="">가입 경로 선택</option>
                            <option value="검색">검색</option>
                            <option value="광고">광고</option>
                            <option value="SNS">SNS</option>
                            <option value="지인 추천">지인 추천</option>
                            <option value="direct">직접 입력</option>
                        </select>
                        <input
                            type="text"
                            id="directJoinPath"
                            name="directJoinPath"
                            placeholder="가입 경로를 입력해 주세요."
                            hidden
                        >
                    </div>
                </div>
            </fieldset>

            <!-- 자기소개는 최대 200자 -->
            <fieldset class="form-card">
                <legend>자기소개</legend>
                <label for="intro" class="intro-label">한 줄 소개 또는 가입 인사</label>
                <textarea
                    id="intro"
                    name="intro"
                    rows="5"
                    maxlength="200"
                    placeholder="자유롭게 입력하세요. (최대 200자)"
                ></textarea>
                <p class="intro-count"><span id="introCount">0</span> / 200자</p>
            </fieldset>

            <!-- 필수 약관 동의 -->
            <fieldset class="form-card terms-card">
                <legend>약관 동의</legend>
                <label class="terms-label">
                    <input type="checkbox" id="agree" name="agree" value="동의함" required>
                    이용약관 및 개인정보 수집에 동의합니다.
                    <span class="required-mark">*</span>
                </label>
                <a href="terms.html" target="_blank" class="terms-link">약관 보기</a>
            </fieldset>

            <div class="form-buttons">
                <button type="reset" class="btn">다시 작성</button>
                <button type="submit" class="btn btn-primary">동의하고 회원가입</button>
            </div>
        </form>
    </main>

    <script src="../과제js/signUp.js"></script>
</body>
</html>
