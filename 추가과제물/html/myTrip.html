<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 여행지</title>

    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <h1>✈️ 나의 여행 앨범 💿</h1>
    <audio controls autoplay>
        <source src="horse.ogg" type="audio/ogg">
        <source src="../media/music.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <hr>
    <!--
        1. git add .
        2. git commit -m "메세지"
        3. git push
    -->

    <picture>
        <img src="../media/콜로세움.jpeg"
            alt="이탈리아 로마의 콜로세움"
            title="2019 이탈리아 여행 - 콜로세움"
            width="300">

            <img src="../media/트레비분수.jpeg"
            alt="이탈리아 로마의 트레비 분수"
            title="2019 이탈리아 여행 - 트레비 분수"
            width="300">
        <p>🇮🇹 2019 이탈리아 여행</p>

        <img src="../media/에펠탑.jpeg"
             alt="프랑스 파리의 에펠탑"
            title="2022 프랑스 여행 - 에펠탑"
            width="300">

        <img src="../media/오르세미술관.jpeg"
            alt="프랑스 파리 오르세 미술관"
            title="2022 프랑스 여행 - 오르세 미술관"
            width="300">
        <p>🇫🇷 2022 프랑스 여행</p>

        <img src="../media/체스키크롬로프.jpeg"
              alt="체코 체스키크롬로프 풍경"
             title="2024 체코 여행 - 체스키크롬로프"
             width="300">

        <img src="../media/카를교.jpeg"
              alt="체코 프라하 카를교"
             title="2024 체코 여행 - 카를교"
             width="300">
        <p>🇨🇿 2024 체코 여행</p>
    </picture>

    <hr>
    <h2> 🎥 나의 여행 브이로그 ✌️ </h2>
    <video width="320" height="240" autoplay>
        <source src="../media/체코-맥주.mov" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <p>2024 체코에서의 맥주🍺</p>
